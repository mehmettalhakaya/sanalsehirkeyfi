<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 21px; fill: #475569; }
      .box-title { font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #0f172a; }
      .box-sub { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; fill: #475569; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #475569; }
      .flow { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #1d4ed8; }
      .flow-green { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #15803d; }
      .flow-amber { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #b45309; }
      .badge { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }
      .note { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect x="55" y="45" width="1490" height="810" rx="28" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>

  <text class="title" x="90" y="108">Sanal Şehir Keyfi - Sistem Mimarisi</text>
  <text class="subtitle" x="90" y="142">Blender ile hazırlanan 3B varlıklar Unity istemcisine aktarılır; kimlik doğrulama HTTPS REST API ve MySQL üzerinden çalışır.</text>

  <rect x="1180" y="76" width="235" height="38" rx="19" fill="#2563eb"/>
  <text class="badge" x="1204" y="101">Katmanlı Mimari</text>

  <!-- Asset preparation -->
  <g filter="url(#shadow)">
    <rect x="95" y="245" width="255" height="150" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="130" cy="282" r="19" fill="#2563eb"/>
    <text x="123" y="289" font-family="Segoe UI, Arial" font-size="20" font-weight="800" fill="#ffffff">B</text>
    <text class="box-title" x="160" y="287">Blender</text>
    <text class="box-sub" x="122" y="324">3B modelleme ve optimizasyon</text>
    <text class="small" x="122" y="354">Louvre modeli</text>
    <text class="small" x="122" y="377">Materyal ve doku düzeni</text>
  </g>

  <!-- Unity client -->
  <g filter="url(#shadow)">
    <rect x="455" y="205" width="310" height="230" rx="20" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
    <circle cx="492" cy="244" r="19" fill="#16a34a"/>
    <text x="485" y="251" font-family="Segoe UI, Arial" font-size="20" font-weight="800" fill="#ffffff">U</text>
    <text class="box-title" x="525" y="249">Unity Client</text>
    <text class="box-sub" x="485" y="287">C# + Unity UI + TextMeshPro</text>
    <text class="small" x="485" y="323">Ana menü</text>
    <text class="small" x="485" y="347">Login / Register panelleri</text>
    <text class="small" x="485" y="371">Keşif sahnesi</text>
    <text class="small" x="485" y="395">UnityWebRequest</text>
  </g>

  <!-- Nginx -->
  <g filter="url(#shadow)">
    <rect x="890" y="230" width="250" height="165" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <circle cx="928" cy="268" r="19" fill="#f97316"/>
    <text x="920" y="275" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#ffffff">N</text>
    <text class="box-title" x="960" y="273">Nginx</text>
    <text class="box-sub" x="925" y="312">Reverse Proxy</text>
    <text class="small" x="925" y="343">HTTPS yönlendirme</text>
    <text class="small" x="925" y="366">API trafiği</text>
  </g>

  <!-- API -->
  <g filter="url(#shadow)">
    <rect x="1215" y="205" width="290" height="230" rx="20" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
    <circle cx="1253" cy="244" r="19" fill="#7c3aed"/>
    <text x="1246" y="251" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#ffffff">A</text>
    <text class="box-title" x="1285" y="249">Node.js API</text>
    <text class="box-sub" x="1245" y="287">Express.js REST servisleri</text>
    <text class="small" x="1245" y="323">/api/login</text>
    <text class="small" x="1245" y="347">/api/register</text>
    <text class="small" x="1245" y="371">JWT oturum yönetimi</text>
    <text class="small" x="1245" y="395">bcrypt şifreleme</text>
  </g>

  <!-- Database -->
  <g filter="url(#shadow)">
    <rect x="1215" y="555" width="290" height="170" rx="20" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
    <circle cx="1253" cy="594" r="19" fill="#dc2626"/>
    <text x="1246" y="601" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#ffffff">D</text>
    <text class="box-title" x="1285" y="599">MySQL</text>
    <text class="box-sub" x="1245" y="637">Veritabanı katmanı</text>
    <text class="small" x="1245" y="668">users</text>
    <text class="small" x="1245" y="691">password_resets</text>
  </g>

  <!-- Web site -->
  <g filter="url(#shadow)">
    <rect x="890" y="555" width="250" height="170" rx="18" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/>
    <circle cx="928" cy="594" r="19" fill="#0284c7"/>
    <text x="920" y="601" font-family="Segoe UI, Arial" font-size="18" font-weight="800" fill="#ffffff">W</text>
    <text class="box-title" x="960" y="599">Web Arayüz</text>
    <text class="box-sub" x="925" y="637">HTML / CSS / JS</text>
    <text class="small" x="925" y="668">loginregister.html</text>
    <text class="small" x="925" y="691">dashboard.html</text>
  </g>

  <!-- Hosting -->
  <g filter="url(#shadow)">
    <rect x="455" y="555" width="310" height="170" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="492" cy="594" r="19" fill="#475569"/>
    <text x="485" y="601" font-family="Segoe UI, Arial" font-size="18" font-weight="800" fill="#ffffff">H</text>
    <text class="box-title" x="525" y="599">Hosting</text>
    <text class="box-sub" x="485" y="637">Ubuntu VPS</text>
    <text class="small" x="485" y="668">Canlı web sitesi</text>
    <text class="small" x="485" y="691">API ve Nginx servisleri</text>
  </g>

  <!-- GitHub -->
  <g filter="url(#shadow)">
    <rect x="95" y="555" width="255" height="170" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="130" cy="594" r="19" fill="#0f172a"/>
    <text x="123" y="601" font-family="Segoe UI, Arial" font-size="18" font-weight="800" fill="#ffffff">G</text>
    <text class="box-title" x="160" y="599">GitHub</text>
    <text class="box-sub" x="122" y="637">Versiyon kontrol</text>
    <text class="small" x="122" y="668">sanalsehirkeyfi</text>
    <text class="small" x="122" y="691">README ve raporlar</text>
  </g>

  <!-- Arrows -->
  <line x1="350" y1="320" x2="455" y2="320" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text class="flow-green" x="364" y="303">3B asset aktarımı</text>

  <line x1="765" y1="320" x2="890" y2="320" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text class="flow" x="785" y="303">HTTPS / JSON</text>

  <line x1="1140" y1="320" x2="1215" y2="320" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text class="flow" x="1152" y="303">API proxy</text>

  <line x1="1360" y1="435" x2="1360" y2="555" stroke="#d97706" stroke-width="4" marker-end="url(#arrowAmber)"/>
  <text class="flow-amber" x="1378" y="504">SQL sorguları</text>

  <line x1="1015" y1="555" x2="1015" y2="395" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text class="flow" x="1032" y="505">web API istekleri</text>

  <line x1="765" y1="640" x2="890" y2="640" stroke="#64748b" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text class="small" x="790" y="624">sunucu yayını</text>

  <line x1="350" y1="640" x2="455" y2="640" stroke="#64748b" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text class="small" x="367" y="624">repo / dosyalar</text>

  <!-- Result note -->
  <rect x="95" y="790" width="1410" height="56" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="note" x="125" y="825">Akış: Kullanıcı Unity ana menüsünden giriş yapar. Unity, HTTPS üzerinden API'ye JSON gönderir. Backend MySQL verisini doğrular ve başarılı giriş sonrası Unity keşif sahnesini başlatır.</text>
</svg>
