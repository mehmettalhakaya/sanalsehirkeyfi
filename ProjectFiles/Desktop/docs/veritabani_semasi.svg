<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 21px; fill: #475569; }
      .db-title { font-family: Segoe UI, Arial, sans-serif; font-size: 25px; font-weight: 800; fill: #ffffff; }
      .table-name { font-family: Segoe UI, Arial, sans-serif; font-size: 30px; font-weight: 800; fill: #0f172a; }
      .field { font-family: Consolas, Segoe UI, monospace; font-size: 19px; fill: #0f172a; }
      .field-muted { font-family: Consolas, Segoe UI, monospace; font-size: 18px; fill: #475569; }
      .tag { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #ffffff; }
      .note { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; fill: #334155; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; fill: #475569; }
      .rel { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #2563eb; }
      .section { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect x="55" y="45" width="1490" height="810" rx="28" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>

  <text class="title" x="90" y="108">Sanal Şehir Keyfi - Veritabanı Şeması</text>
  <text class="subtitle" x="90" y="142">Kimlik doğrulama sistemi MySQL üzerinde kullanıcı hesapları ve şifre sıfırlama kayıtları ile çalışır.</text>

  <rect x="1190" y="76" width="260" height="40" rx="20" fill="#dc2626"/>
  <text class="db-title" x="1217" y="103">MySQL / mtk_db</text>

  <!-- users table -->
  <g filter="url(#shadow)">
    <rect x="110" y="215" width="560" height="535" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
    <rect x="110" y="215" width="560" height="80" rx="22" fill="#2563eb"/>
    <path d="M110 273 H670 V295 H110 Z" fill="#2563eb"/>
    <text class="db-title" x="140" y="265">users</text>
    <rect x="545" y="238" width="88" height="30" rx="15" fill="#1d4ed8"/>
    <text class="tag" x="568" y="259">ANA</text>

    <text class="field" x="145" y="335">🔑 id</text>
    <text class="field-muted" x="330" y="335">INT, AUTO_INCREMENT, PRIMARY KEY</text>

    <text class="field" x="145" y="385">username</text>
    <text class="field-muted" x="330" y="385">VARCHAR(50), UNIQUE, NOT NULL</text>

    <text class="field" x="145" y="435">email</text>
    <text class="field-muted" x="330" y="435">VARCHAR(255), UNIQUE, NOT NULL</text>

    <text class="field" x="145" y="485">password_hash</text>
    <text class="field-muted" x="330" y="485">VARCHAR(255), NOT NULL</text>

    <text class="field" x="145" y="535">role</text>
    <text class="field-muted" x="330" y="535">ENUM('user','admin'), DEFAULT user</text>

    <text class="field" x="145" y="585">is_active</text>
    <text class="field-muted" x="330" y="585">TINYINT(1), DEFAULT 1</text>

    <text class="field" x="145" y="635">created_at</text>
    <text class="field-muted" x="330" y="635">TIMESTAMP, DEFAULT CURRENT_TIMESTAMP</text>

    <text class="field" x="145" y="685">updated_at</text>
    <text class="field-muted" x="330" y="685">TIMESTAMP, ON UPDATE CURRENT_TIMESTAMP</text>
  </g>

  <!-- password resets table -->
  <g filter="url(#shadow)">
    <rect x="930" y="250" width="505" height="430" rx="22" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <rect x="930" y="250" width="505" height="80" rx="22" fill="#f97316"/>
    <path d="M930 308 H1435 V330 H930 Z" fill="#f97316"/>
    <text class="db-title" x="960" y="300">password_resets</text>
    <rect x="1302" y="273" width="94" height="30" rx="15" fill="#c2410c"/>
    <text class="tag" x="1320" y="294">YARDIMCI</text>

    <text class="field" x="965" y="370">🔑 id</text>
    <text class="field-muted" x="1165" y="370">INT, AUTO_INCREMENT, PRIMARY KEY</text>

    <text class="field" x="965" y="420">🔗 user_id</text>
    <text class="field-muted" x="1165" y="420">INT, NOT NULL, FOREIGN KEY</text>

    <text class="field" x="965" y="470">token</text>
    <text class="field-muted" x="1165" y="470">VARCHAR(255), UNIQUE, NOT NULL</text>

    <text class="field" x="965" y="520">expires_at</text>
    <text class="field-muted" x="1165" y="520">TIMESTAMP, NOT NULL</text>

    <text class="field" x="965" y="570">used</text>
    <text class="field-muted" x="1165" y="570">TINYINT(1), DEFAULT 0</text>

    <text class="field" x="965" y="620">created_at</text>
    <text class="field-muted" x="1165" y="620">TIMESTAMP, DEFAULT CURRENT_TIMESTAMP</text>
  </g>

  <!-- relationship -->
  <path d="M670 420 C775 420, 810 420, 930 420" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <text class="rel" x="735" y="393">1 kullanıcı</text>
  <text class="rel" x="735" y="448">N şifre sıfırlama isteği</text>
  <circle cx="690" cy="420" r="7" fill="#2563eb"/>
  <circle cx="905" cy="420" r="7" fill="#2563eb"/>

  <!-- api operations -->
  <g filter="url(#shadow)">
    <rect x="730" y="540" width="205" height="150" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text class="section" x="760" y="585">API İşlemleri</text>
    <text class="small" x="760" y="625">/api/register → users</text>
    <text class="small" x="760" y="652">/api/login → users</text>
    <text class="small" x="760" y="679">/api/reset-password</text>
  </g>

  <line x1="832" y1="540" x2="520" y2="485" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="935" y1="610" x2="930" y2="548" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>

  <!-- indexes and security -->
  <g filter="url(#shadow)">
    <rect x="110" y="780" width="665" height="60" rx="18" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
    <text class="note" x="140" y="815">Güvenlik: Şifreler açık metin tutulmaz; bcrypt ile hashlenen değer password_hash alanına kaydedilir.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="825" y="780" width="610" height="60" rx="18" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/>
    <text class="note" x="855" y="815">İndeksler: email, username, role ve token alanları arama/doğrulama işlemlerini hızlandırır.</text>
  </g>

  <!-- legend -->
  <rect x="91" y="165" width="385" height="42" rx="21" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text class="small" x="115" y="192">🔑 Primary Key</text>
  <text class="small" x="250" y="192">🔗 Foreign Key</text>
  <text class="small" x="385" y="192">UNIQUE alanlar</text>
</svg>
